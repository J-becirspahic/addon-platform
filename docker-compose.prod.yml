version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: addon-platform-db
    restart: unless-stopped
    env_file: .env.production
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-addon_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - addon-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  minio:
    image: minio/minio:latest
    container_name: addon-platform-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file: .env.production
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - addon-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  registry:
    image: verdaccio/verdaccio:5
    container_name: addon-platform-registry
    restart: unless-stopped
    volumes:
      - verdaccio_data:/verdaccio/storage
    networks:
      - addon-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: addon-platform-api
    restart: unless-stopped
    env_file: .env.production
    environment:
      NODE_ENV: production
      API_PORT: 3001
      API_HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-addon_platform}?schema=public
      BUILDER_URL: http://builder:3002
      S3_ENDPOINT: http://minio:9000
    secrets:
      - jwt_access_secret
      - jwt_refresh_secret
      - github_app_private_key
      - github_app_webhook_secret
      - github_oauth_client_secret
      - build_callback_secret
    entrypoint: >
      sh -c "npx prisma migrate deploy && node dist/server.js"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - addon-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  builder:
    build:
      context: .
      dockerfile: packages/builder/Dockerfile
    container_name: addon-platform-builder
    restart: unless-stopped
    env_file: .env.production
    environment:
      NODE_ENV: production
      BUILDER_PORT: 3002
      BUILDER_HOST: 0.0.0.0
      BUILD_CALLBACK_URL: http://api:3001/api/internal/build-callback
      DOCKER_SOCKET: /var/run/docker.sock
      S3_ENDPOINT: http://minio:9000
      REGISTRY_URL: http://registry:4873
      MAX_CONCURRENT_BUILDS: 3
      BUILD_TIMEOUT_MS: 600000
    secrets:
      - build_callback_secret
      - github_app_private_key
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - addon-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    container_name: addon-platform-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NUXT_PUBLIC_API_BASE_URL: https://${DOMAIN:-localhost}/api
    depends_on:
      - api
    networks:
      - addon-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  caddy:
    image: caddy:2-alpine
    container_name: addon-platform-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web
    networks:
      - addon-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

volumes:
  postgres_data:
  minio_data:
  verdaccio_data:
  caddy_data:
  caddy_config:

secrets:
  jwt_access_secret:
    file: ./secrets/jwt_access_secret
  jwt_refresh_secret:
    file: ./secrets/jwt_refresh_secret
  github_app_private_key:
    file: ./secrets/github_app_private_key
  github_app_webhook_secret:
    file: ./secrets/github_app_webhook_secret
  github_oauth_client_secret:
    file: ./secrets/github_oauth_client_secret
  build_callback_secret:
    file: ./secrets/build_callback_secret

networks:
  addon-network:
    driver: bridge
