version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: addon-platform-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: addon_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - addon-network

  minio:
    image: minio/minio:latest
    container_name: addon-platform-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - addon-network

  registry:
    image: verdaccio/verdaccio:5
    container_name: addon-platform-registry
    restart: unless-stopped
    ports:
      - "4873:4873"
    volumes:
      - verdaccio_data:/verdaccio/storage
    networks:
      - addon-network

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: addon-platform-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      API_PORT: 3001
      API_HOST: 0.0.0.0
      DATABASE_URL: postgresql://postgres:postgres@db:5432/addon_platform?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-your-access-token-secret-32chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your-refresh-token-secret-32chars}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
      GITHUB_APP_WEBHOOK_SECRET: ${GITHUB_APP_WEBHOOK_SECRET:-}
      GITHUB_APP_CLIENT_ID: ${GITHUB_APP_CLIENT_ID:-}
      GITHUB_APP_CLIENT_SECRET: ${GITHUB_APP_CLIENT_SECRET:-}
      GITHUB_APP_INSTALLATION_ID: ${GITHUB_APP_INSTALLATION_ID:-}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:-}
      GITHUB_OAUTH_CALLBACK_URL: http://localhost:3001/api/auth/github/callback
      BUILDER_URL: http://builder:3002
      BUILD_CALLBACK_SECRET: ${BUILD_CALLBACK_SECRET:-builder-callback-secret-32chars}
      FRONTEND_URL: http://localhost:3000
      COOKIE_DOMAIN: localhost
      COOKIE_SECURE: "false"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - addon-network

  builder:
    build:
      context: .
      dockerfile: packages/builder/Dockerfile
    container_name: addon-platform-builder
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
      BUILDER_PORT: 3002
      BUILDER_HOST: 0.0.0.0
      BUILD_CALLBACK_URL: http://api:3001/api/internal/build-callback
      BUILD_CALLBACK_SECRET: ${BUILD_CALLBACK_SECRET:-builder-callback-secret-32chars}
      DOCKER_SOCKET: /var/run/docker.sock
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: addon-artifacts
      S3_REGION: us-east-1
      REGISTRY_URL: http://registry:4873
      MAX_CONCURRENT_BUILDS: 3
      BUILD_TIMEOUT_MS: 600000
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
      GITHUB_APP_INSTALLATION_ID: ${GITHUB_APP_INSTALLATION_ID:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - addon-network

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    container_name: addon-platform-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NUXT_PUBLIC_API_BASE_URL: http://localhost:3001
    depends_on:
      - api
    networks:
      - addon-network

  # Development service that runs pnpm dev instead of built images
  api-dev:
    image: node:20-alpine
    container_name: addon-platform-api-dev
    working_dir: /app
    command: sh -c "corepack enable && corepack prepare pnpm@9 --activate && pnpm install && pnpm db:generate && pnpm dev:api"
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
      - api_pkg_node_modules:/app/packages/api/node_modules
      - shared_node_modules:/app/packages/shared/node_modules
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      API_PORT: 3001
      API_HOST: 0.0.0.0
      DATABASE_URL: postgresql://postgres:postgres@db:5432/addon_platform?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-development-access-secret-32characters}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-development-refresh-secret-32characters}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
      GITHUB_APP_WEBHOOK_SECRET: ${GITHUB_APP_WEBHOOK_SECRET:-}
      GITHUB_APP_CLIENT_ID: ${GITHUB_APP_CLIENT_ID:-}
      GITHUB_APP_CLIENT_SECRET: ${GITHUB_APP_CLIENT_SECRET:-}
      GITHUB_APP_INSTALLATION_ID: ${GITHUB_APP_INSTALLATION_ID:-}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:-}
      GITHUB_OAUTH_CALLBACK_URL: http://localhost:3001/api/auth/github/callback
      BUILDER_URL: http://builder-dev:3002
      BUILD_CALLBACK_SECRET: ${BUILD_CALLBACK_SECRET:-builder-callback-secret-32chars}
      FRONTEND_URL: http://localhost:3000
      COOKIE_DOMAIN: localhost
      COOKIE_SECURE: "false"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - addon-network
    profiles:
      - dev

  builder-dev:
    image: node:20-alpine
    container_name: addon-platform-builder-dev
    working_dir: /app
    command: sh -c "corepack enable && corepack prepare pnpm@9 --activate && pnpm install && pnpm dev:builder"
    volumes:
      - .:/app
      - builder_node_modules:/app/packages/builder/node_modules
      - shared_node_modules:/app/packages/shared/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
      BUILDER_PORT: 3002
      BUILDER_HOST: 0.0.0.0
      BUILD_CALLBACK_URL: http://api-dev:3001/api/internal/build-callback
      BUILD_CALLBACK_SECRET: ${BUILD_CALLBACK_SECRET:-builder-callback-secret-32chars}
      DOCKER_SOCKET: /var/run/docker.sock
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: addon-artifacts
      S3_REGION: us-east-1
      REGISTRY_URL: http://registry:4873
      MAX_CONCURRENT_BUILDS: 3
      BUILD_TIMEOUT_MS: 600000
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
      GITHUB_APP_INSTALLATION_ID: ${GITHUB_APP_INSTALLATION_ID:-}
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - addon-network
    profiles:
      - dev

  web-dev:
    image: node:20-alpine
    container_name: addon-platform-web-dev
    working_dir: /app
    command: sh -c "corepack enable && corepack prepare pnpm@9 --activate && pnpm install && pnpm dev:web"
    volumes:
      - .:/app
      - web_node_modules:/app/packages/web/node_modules
      - shared_node_modules:/app/packages/shared/node_modules
    ports:
      - "3000:3000"
    environment:
      NUXT_PUBLIC_API_BASE_URL: http://localhost:3001
    depends_on:
      - api-dev
    networks:
      - addon-network
    profiles:
      - dev

volumes:
  postgres_data:
  minio_data:
  verdaccio_data:
  api_node_modules:
  api_pkg_node_modules:
  shared_node_modules:
  web_node_modules:
  builder_node_modules:

networks:
  addon-network:
    driver: bridge
